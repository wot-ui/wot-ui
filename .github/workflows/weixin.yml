name: Upload To WeixinMiniProgram

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

  # 允许手动触发工作流
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        type: string
        default: ''
      description:
        description: '版本描述'
        required: false
        type: string
        default: '手动发布版本'
      branch:
        description: '要使用的分支'
        required: false
        type: string
        default: 'master'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || 'main' }}
    - name: Prepare minici env
      shell: bash
      env:
        MP_PRIVATE_KEY: ${{ secrets.MP_PRIVATE_KEY }}
        MP_APPID: ${{ secrets.MP_APPID }}
        INPUT_VERSION: ${{ github.event.inputs.version }}
        INPUT_DESC: ${{ github.event.inputs.description || '自动发布版本' }}
      run: |
        if [[ -z "$MP_PRIVATE_KEY" ]]; then
          echo "Please set 'MP_PRIVATE_KEY' in actions secrets"
          exit 1
        fi

        if [[ -z "$MP_APPID" ]]; then
          echo "Please set 'MP_APPID' in actions secrets"
          exit 1
        fi

        echo "$MP_PRIVATE_KEY" > private.key
        echo "WEIXIN_APPID=$MP_APPID" >> "$GITHUB_ENV"
        echo "WEIXIN_PRIVATE_KEY_PATH=private.key" >> "$GITHUB_ENV"

        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "MINICI_VERSION=$INPUT_VERSION" >> "$GITHUB_ENV"
          echo "MINICI_DESC<<EOF" >> "$GITHUB_ENV"
          echo "${INPUT_DESC:-手动发布版本}" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
        else
          echo "MINICI_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "MINICI_DESC<<EOF" >> "$GITHUB_ENV"
          echo "自动发布 ${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - uses: pnpm/action-setup@v4
      name: Install pnpm

    - name: upload
      run: |
        pnpm install
        pnpm upload:mp-weixin
